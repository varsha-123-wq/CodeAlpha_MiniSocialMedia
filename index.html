  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <div class="profile">
      <img src = "https://cdn-icons-png.flaticon.com/512/6997/6997662.png" alt="Profile">

<button id="followBtn">Follow</button>
<p>BCA Student | Frontend Developer</p>
<p>🌟120 Followers | 80 Following</p>


    </div>

    <!--Creat Post Section-->
    <div class="post-box">
      <textarea
      id="postInput"
      placeholder="What's on your mind?">
    </textarea>

    <button class="post-btn" onclick="addPost()">
    post
  </button>

    </div>

        <p>Welcome to my Mini Social Media App🚀</p>
        <button class="like-btn"
        onclick="likePost(this)">
      🤍Like</button>

      <span class="like-count">
        0 Likes
      </span>


      </div>
      <div class="post">
        <p>💻Learning HTML, CSS and JavaScript</p>
        <button class="like-btn" onclick="likePost(this)">🤍Like</button>
        <span class="like-count">0 Likes</span>
      </div>
      <div class="post">
        <p>🎉Completed my CodeAlpha Mini Social Media Projects.</p>
        <button class="like-btn" onclick="likePost(this)">🤍Like</button>
        <span class="like-count">0 Likes</span>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
